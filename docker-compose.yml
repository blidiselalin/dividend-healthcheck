# Production URL (DuckDNS + Caddy on host): https://pulse-dividend.duckdns.org
# Streamlit binds localhost:8501 only; Caddy terminates HTTPS on 443 → 127.0.0.1:8501
#
# All persistent data lives on ONE Docker volume: dividendscope-persistent-data → /data
#   /data/postgres/     PostgreSQL cluster (users, portfolios, stock_documents)
#   /data/users/        legacy SQLite import source only (optional, one-time --migrate-files)
#   /data/vectordb/     legacy Chroma import source only (optional, one-time --migrate-files)
#
# Rebuild: docker compose up -d --build
# Never run: docker compose down -v  (deletes the data volume)

services:
  postgres:
    image: postgres:16-alpine
    container_name: dividendscope-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dividendscope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dividendscope}
      POSTGRES_DB: ${POSTGRES_DB:-dividendscope}
      PGDATA: /data/postgres
    volumes:
      - dividendscope-data:/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-dividendscope} -d ${POSTGRES_DB:-dividendscope}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  dividendscope:
    build: .
    image: dividend-healthcheck-dividendscope
    container_name: dividendscope
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8501:8501"
    environment:
      DIVIDENDSCOPE_DATA_DIR: /data
      DIVIDENDSCOPE_LOG_LEVEL: INFO
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://${POSTGRES_USER:-dividendscope}:${POSTGRES_PASSWORD:-dividendscope}@postgres:5432/${POSTGRES_DB:-dividendscope}
    volumes:
      - dividendscope-data:/data
    command:
      - streamlit
      - run
      - app.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true
      - --browser.gatherUsageStats=false
      - --server.enableCORS=false
      - --server.enableXsrfProtection=false

volumes:
  dividendscope-data:
    name: dividendscope-persistent-data
