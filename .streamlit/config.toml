[theme]
# Match DividendScope dark defaults (ui/theme_mode.py). Light mode overrides via injected CSS.
base = "dark"
primaryColor = "#2dd4bf"
backgroundColor = "#0b1220"
secondaryBackgroundColor = "#131c2e"
textColor = "#e8eef7"
font = "sans serif"

[server]
address = "0.0.0.0"
port = 8501
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 50

[browser]
gatherUsageStats = false

# Hide Deploy / developer toolbar in the app header (user-facing mode).
[client]
toolbarMode = "viewer"
