[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q --tb=short
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: requires PostgreSQL (DATABASE_URL) and/or populated market library
    postgres_mock: unit test that mocks Postgres mode (DATABASE_URL set, no live DB)
