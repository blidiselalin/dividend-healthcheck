name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          DIVIDENDSCOPE_DATA_DIR: ${{ runner.temp }}/dividendscope-ci-data
        run: |
          python -m pytest tests/ -v --tb=short -m "not integration"

  integration:
    name: integration (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dividendscope
          POSTGRES_PASSWORD: test
          POSTGRES_DB: dividendscope
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dividendscope -d dividendscope"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Postgres integration tests
        env:
          DATABASE_URL: postgresql://dividendscope:test@127.0.0.1:5432/dividendscope
          DIVIDENDSCOPE_DATA_DIR: ${{ runner.temp }}/dividendscope-ci-data
        run: |
          python -m pytest -m integration -v --tb=short
